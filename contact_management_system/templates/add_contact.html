{% extends 'base.html' %}

{% block content %}

<h2>Add Contact</h2>

<form method="post">
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Phone</label>
    <input type="text" name="phone" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <button type="submit">Add Contact</button>
</form>

{% endblock %}
