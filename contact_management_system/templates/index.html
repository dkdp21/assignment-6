{% extends 'base.html' %}

{% block content %}

<form action="/search" method="post" style="margin-bottom:20px;">
    <input type="text" name="query" placeholder="Search by name or phone">
    <button type="submit">Search</button>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for contact in contacts %}
    <tr>
        <td>{{ contact.name }}</td>
        <td>{{ contact.phone }}</td>
        <td>{{ contact.email }}</td>
        <td>
            <a class="btn" href="/edit/{{ loop.index0 }}">Edit</a>
            <a class="btn btn-delete" href="/delete/{{ loop.index0 }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
